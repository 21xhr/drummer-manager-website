<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    
    <title>Explorer | Drummer Manager</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/explorer.css">

    <script src="/js/app-config.js" defer></script>
    <script src="/js/brand-logo.js" defer></script>
    <script src="/js/identity-reminder.js" defer></script>
    <script src="/js/typewriter.js" defer></script>
    <script src="/js/site-header.js" defer></script>
    <script src="/js/social-links.js" defer></script>
</head>
<body>

    <div id="lockScreenOverlay" class="lock-screen-overlay">
        <div class="form-container terminal-card">
            <i id="lockScreenStatusIcon" class="fa-solid fa-spinner fa-spin lock-screen-status-icon neon-text"></i>
            <h2 class="neon-text">SYSTEM ENCRYPTED</h2>
            <div id="lockScreenStatusText" class="roboto lock-screen-status-text">
                Verifying secure link...
            </div>
        </div>
    </div>

    <div class="explorer-app-container">
        <site-header></site-header>

        <div class="explorer-content-grid">
            <aside class="explorer-sidebar" id="filterPane">
                <button class="pane-toggle" onclick="togglePane('filterPane', event)">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>

                <div class="explorer-pane-content">
                    <h3 class="neon-text filter-pane-title">SYSTEM FILTERS</h3>
                    
                    <div class="explorer-filter-group">
                        <label class="label-accent">DAYS ACTIVE</label>
                        <div class="range-wrapper">
                            <div class="dual-range-container">
                                <div class="range-track"></div>
                                <div id="rangeHighlight" class="range-highlight"></div>
                                <input type="range" id="minDays" min="0" max="21" value="0" class="range-input">
                                <input type="range" id="maxDays" min="0" max="21" value="21" class="range-input">
                            </div>
                            <div class="range-inputs-row">
                                <input type="number" id="minDaysInput" min="0" max="21" value="0" class="small-num-input">
                                <span class="range-to-label roboto">TO</span>
                                <input type="number" id="maxDaysInput" min="0" max="21" value="21" class="small-num-input">
                            </div>
                        </div>
                    </div>

                    <div class="explorer-filter-group">
                        <label class="label-accent">CHALLENGE STATUS</label>
                        <div id="statusFilters" class="status-filter-stack">
                            <div class="explorer-status-filter-item active" onclick="toggleStatusFilter(this, 'ACTIVE')">ACTIVE</div>
                            <div class="explorer-status-filter-item active" onclick="toggleStatusFilter(this, 'ARCHIVED')">ARCHIVED</div>
                            <div class="explorer-status-filter-item active" onclick="toggleStatusFilter(this, 'AUCTIONED')">AUCTIONED</div>
                            <div class="explorer-status-filter-item active" onclick="toggleStatusFilter(this, 'COMPLETED')">COMPLETED</div>
                            <div class="explorer-status-filter-item active" onclick="toggleStatusFilter(this, 'FAILED')">FAILED</div>
                            <div class="explorer-status-filter-item active" onclick="toggleStatusFilter(this, 'IN_PROGRESS')">IN_PROGRESS</div>
                            <div class="explorer-status-filter-item active" onclick="toggleStatusFilter(this, 'REMOVED')">REMOVED</div>
                            <div class="explorer-status-filter-item active" onclick="toggleStatusFilter(this, 'UNDER_REVIEW')">UNDER_REVIEW</div>
                        </div>
                    </div>

                    <div class="explorer-filter-group">
                        <label class="label-accent">PUSH THRESHOLD</label>
                        <div class="range-wrapper">
                            <div class="dual-range-container">
                                <div class="range-track"></div>
                                <div id="pushRangeHighlight" class="range-highlight"></div>
                                <input type="range" id="minPush" min="0" max="1000" value="0" class="range-input">
                                <input type="range" id="maxPush" min="0" max="1000" value="1000" class="range-input">
                            </div>
                            <div class="range-inputs-row">
                                <input type="number" id="minPushInput" min="0" max="1000" value="0" class="small-num-input">
                                <span class="range-to-label roboto">TO</span>
                                <input type="number" id="maxPushInput" min="0" max="1000" value="1000" class="small-num-input">
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="explorer-main">
                <div class="explorer-list-controls">
                    <div class="explorer-search-bar">
                        <span class="neon-text explorer-search-prompt">></span>
                        <input type="text" id="globalSearch" class="filter-input-round" placeholder="SEARCH DATABASE...">
                    </div>
                    <div id="syncTimer" class="explorer-sync-status">SYNCING</div>
                </div>

                <div id="challengeList">
                    <div class="challenge-list-header">
                        <span>ID</span>
                        <span>STATUS</span>
                        <span>PROPOSER</span>
                        <span>DESCRIPTION</span>
                        <span>PUSHES</span>
                    </div>
                    <div id="listEntries"></div>
                </div>
            </main>

            <aside class="explorer-sidebar collapsed" id="detailPane">
                <button class="pane-toggle" onclick="togglePane('detailPane')">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <div class="explorer-pane-content">
                    <div id="detailContent" class="u-hidden"></div>
                </div>
            </aside>
        </div>
    </div>

    <social-links></social-links>

<script>
    /* ==========================================================================
       1. STATE
       ========================================================================== */
    let allChallenges = [];
    let lastSyncTimestamp = new Date().toISOString();
    let activeStatusFilters = [
        'ACTIVE',
        'ARCHIVED',
        'AUCTIONED',
        'COMPLETED',
        'FAILED',
        'IN_PROGRESS',
        'REMOVED',
        'UNDER_REVIEW'
    ];

    /* ==========================================================================
       2. CONFIG
       ========================================================================== */
    const getApiBaseUrl = () => {
        const hostname = window.location.hostname;

        if (hostname === 'localhost' || hostname === '127.0.0.1' || hostname === '0.0.0.0') {
            return 'http://127.0.0.1:3000/api/v1';
        }

        if (hostname.startsWith('192.168.')) {
            return `http://${hostname}:3000/api/v1`;
        }

        return 'https://drummer-manager-api.vercel.app/api/v1';
    };

    const API_BASE_URL = getApiBaseUrl();

    /* ==========================================================================
       3. DOM REFERENCES
       ========================================================================== */
    const minDaysRange = document.getElementById('minDays');
    const maxDaysRange = document.getElementById('maxDays');
    const minDaysInput = document.getElementById('minDaysInput');
    const maxDaysInput = document.getElementById('maxDaysInput');
    const rangeHighlight = document.getElementById('rangeHighlight');

    const minPushRange = document.getElementById('minPush');
    const maxPushRange = document.getElementById('maxPush');
    const minPushInput = document.getElementById('minPushInput');
    const maxPushInput = document.getElementById('maxPushInput');
    const pushRangeHighlight = document.getElementById('pushRangeHighlight');

    const globalSearchInput = document.getElementById('globalSearch');
    const lockScreenOverlay = document.getElementById('lockScreenOverlay');
    const lockScreenStatusIcon = document.getElementById('lockScreenStatusIcon');
    const lockScreenStatusText = document.getElementById('lockScreenStatusText');
    const listEntries = document.getElementById('listEntries');
    const detailPane = document.getElementById('detailPane');
    const detailContent = document.getElementById('detailContent');
    const syncTimer = document.getElementById('syncTimer');

    /* ==========================================================================
       4. FILTER RANGE HELPERS
       ========================================================================== */
    function syncActiveDaysRange() {
        let minVal = parseInt(minDaysRange.value);
        let maxVal = parseInt(maxDaysRange.value);

        if (minVal > maxVal) {
            [minVal, maxVal] = [maxVal, minVal];
        }

        minDaysInput.value = minVal;
        maxDaysInput.value = maxVal;

        const left = (minVal / 21) * 100;
        const right = 100 - (maxVal / 21) * 100;

        rangeHighlight.style.left = `${left}%`;
        rangeHighlight.style.right = `${right}%`;

        applyFilters();
    }

    function getPushRangeMax() {
        if (!Array.isArray(allChallenges) || allChallenges.length === 0) return 10;

        return Math.max(
            ...allChallenges.map(c => Number(c.totalPush) || 0),
            10
        );
    }

    function initializePushRange() {
        const dynamicMax = getPushRangeMax();
        const currentMax = parseInt(maxPushRange.max);

        if (currentMax === dynamicMax) return; // avoid useless DOM updates

        minPushRange.max = dynamicMax;
        maxPushRange.max = dynamicMax;
        minPushInput.max = dynamicMax;
        maxPushInput.max = dynamicMax;

        if (parseInt(minPushRange.value) > dynamicMax) minPushRange.value = dynamicMax;
        if (parseInt(maxPushRange.value) > dynamicMax) maxPushRange.value = dynamicMax;
        if (parseInt(minPushInput.value) > dynamicMax) minPushInput.value = dynamicMax;
        if (parseInt(maxPushInput.value) > dynamicMax) maxPushInput.value = dynamicMax;

        syncPushRange();
    }

    function syncPushRange() {
        const dynamicMax = getPushRangeMax();

        let minVal = parseInt(minPushRange.value) || 0;
        let maxVal = parseInt(maxPushRange.value) || dynamicMax;

        minVal = Math.max(0, Math.min(minVal, dynamicMax));
        maxVal = Math.max(0, Math.min(maxVal, dynamicMax));

        if (minVal > maxVal) [minVal, maxVal] = [maxVal, minVal];

        minPushRange.value = minVal;
        maxPushRange.value = maxVal;
        minPushInput.value = minVal;
        maxPushInput.value = maxVal;

        const left = (minVal / dynamicMax) * 100;
        const right = 100 - (maxVal / dynamicMax) * 100;

        pushRangeHighlight.style.left = `${left}%`;
        pushRangeHighlight.style.right = `${right}%`;

        applyFilters();
    }

    function toggleStatusFilter(element, status) {
        element.classList.toggle('active');

        if (activeStatusFilters.includes(status)) {
            activeStatusFilters = activeStatusFilters.filter(s => s !== status);
        } else {
            activeStatusFilters.push(status);
        }

        applyFilters();
    }

    /* ==========================================================================
       5. FILTER APPLICATION
       ========================================================================== */
    function applyFilters() {
        const search = globalSearchInput.value.toLowerCase();
        const minD = parseInt(minDaysRange.value);
        const maxD = parseInt(maxDaysRange.value);
        const minP = parseInt(minPushRange.value) || 0;
        const maxP = parseInt(maxPushRange.value) || getPushRangeMax();

        const filtered = allChallenges.filter(c => {
            const days = c.streamDaysSinceActivation || 0;
            const pushCount = c.totalPush || 0;

            const dateMatch = days >= minD && days <= maxD;
            const pushMatch = pushCount >= minP && pushCount <= maxP;
            const statusMatch = activeStatusFilters.includes(c.status.toUpperCase());

            const proposerName = (c.proposer?.accounts?.[0]?.username || c.proposer?.username || '').toLowerCase();
            const textMatch =
                proposerName.includes(search) ||
                c.challengeId.toString().includes(search) ||
                String(c.challengeText).toLowerCase().includes(search);

            return dateMatch && pushMatch && statusMatch && textMatch;
        });

        renderList(filtered);
    }

    /* ==========================================================================
       6. LOCK SCREEN
       ========================================================================== */
    function showLockScreen(message) {
        lockScreenOverlay.classList.remove('u-hidden');
        lockScreenStatusText.innerHTML = message;
        lockScreenStatusIcon.className = "fa-solid fa-lock lock-screen-status-icon neon-text";
    }

    async function verifyExplorerAccess(token) {
        try {
            const response = await fetch(`${API_BASE_URL}/token/verify-explorer`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });

            const data = await response.json();

            if (!response.ok) {
                lockScreenStatusIcon.classList.remove('fa-spinner', 'fa-spin');
                lockScreenStatusIcon.classList.add('fa-lock', 'text-red-500');
                lockScreenStatusText.innerHTML = `ACCESS DENIED<br><span style='font-size:11px'>${data.message || 'Invalid Token'}</span>`;
                return;
            }

            const userSpan = document.getElementById('reminderUsername');
            const platSpan = document.getElementById('reminderPlatform');
            const identityReminder = document.getElementById('identityReminder');

            if (userSpan && platSpan) {
                userSpan.textContent = data.username;
                platSpan.textContent = data.platformName;

                const platClass = `platform-${data.platformName.toLowerCase()}`;
                userSpan.classList.add(platClass);
                platSpan.classList.add(platClass);
            }

            lockScreenStatusIcon.classList.remove('fa-spinner', 'fa-spin');
            lockScreenStatusIcon.classList.add('fa-circle-check', 'text-success-green');

            lockScreenStatusText.innerHTML = '';

            runTypewriter({
                container: lockScreenStatusText,
                text: `> ACCESS GRANTED: ${data.username} @ ${data.platformName}`,
                onComplete: () => {
                    lockScreenOverlay.classList.add('u-hidden');

                    if (identityReminder) {
                        identityReminder.classList.remove('u-hidden');
                    }

                    localStorage.setItem('explorer_token', token);
                    loadInitialData();
                    startPolling();
                }
            });
        } catch (err) {
            lockScreenStatusIcon.classList.remove('fa-spinner', 'fa-spin');
            lockScreenStatusIcon.classList.add('fa-triangle-exclamation', 'text-red-500');
            lockScreenStatusText.innerHTML = "CONNECTION ERROR<br>System offline.";
        }
    }

    /* ==========================================================================
       7. DATA LOADING / POLLING
       ========================================================================== */
    async function loadInitialData() {
        try {
            const res = await fetch(`${API_BASE_URL}/challenges`);
            if (!res.ok) throw new Error("Database offline");

            const payload = await res.json();
            allChallenges = Array.isArray(payload) ? payload : (payload.data || []);

            initializePushRange();
            renderList(allChallenges);
        } catch (err) {
            console.error("Fetch error", err);
        }
    }

    async function startPolling() {
        const isLiveMode = window.APP_CONFIG?.EXPLORER_LIVE_MODE === true;
        console.log(`Explorer Live Mode: ${isLiveMode ? 'ENABLED' : 'DISABLED'}`);
        if (!isLiveMode) return;

        setInterval(async () => {
            try {
                const response = await fetch(`${API_BASE_URL}/challenges/delta?since=${lastSyncTimestamp}`);
                if (!response.ok) return;

                const updates = await response.json();

                if (updates.length > 0) {
                    console.log("Polling updates:", updates);
                    updates.forEach(updatedChallenge => {
                        allChallenges = allChallenges.filter(c => c.challengeId !== updatedChallenge.challengeId);
                        allChallenges.unshift(updatedChallenge);
                    });

                    initializePushRange();
                    applyFilters();

                    lastSyncTimestamp = new Date().toISOString();

                    syncTimer.textContent = "DATABASE UPDATED";
                    syncTimer.style.color = "var(--primary-neon)";

                    setTimeout(() => {
                        syncTimer.textContent = "SYNCING";
                        syncTimer.style.color = "";
                    }, 2000);
                }
            } catch (err) {
                console.warn("Poll failed", err);
            }
        }, 21000);
    }

    /* ==========================================================================
       8. LIST RENDERING
       ========================================================================== */
    function renderList(challenges) {
        listEntries.innerHTML = '';

        challenges.forEach(c => {
            const row = document.createElement('div');
            row.className = 'challenge-list-row animate-fadeIn';

            const proposerName = c.proposer?.accounts?.[0]?.username || c.proposer?.username || 'Unknown';
            
            const challengeText = (c.challengeText && typeof c.challengeText === 'object') ? c.challengeText : {};
            const textPreview = challengeText.goal || challengeText.instructions || 'No Data';

            const pushCount = c.totalPush !== undefined && c.totalPush !== null ? c.totalPush : 0;

            row.innerHTML = `
                <span class="neon-text id-column">${c.challengeId}</span>
                <div class="status-badge-wrapper">
                    <span class="status-badge status-${c.status.toLowerCase()}">${c.status}</span>
                </div>
                <span class="proposer-column">${proposerName}</span>
                <div class="challenge-list-description">${textPreview}</div>
                <span class="neon-text push-column">${pushCount}</span>
            `;

            row.onclick = () => hydrateDetail(c);
            listEntries.appendChild(row);
        });
    }

    /* ==========================================================================
       9. DETAIL PANE
       ========================================================================== */
    function hydrateDetail(c) {
        const paneContent = detailPane.querySelector('.explorer-pane-content');

        if (paneContent) {
            paneContent.scrollTop = 0;
        }

        detailPane.classList.remove('collapsed');
        detailContent.classList.remove('u-hidden');

        const shareLink = `${window.location.origin}/explorer/index.html?id=${c.challengeId}`;
        
        const proposerName = c.proposerUsernameSnapshot || 'Unknown';
        const proposerPlatform = c.proposerPlatformNameSnapshot || '';

        const submittedAt = c.timestampSubmitted
            ? new Date(c.timestampSubmitted).toLocaleString()
            : 'Unknown';
        
        const challengeText = (c.challengeText && typeof c.challengeText === 'object') ? c.challengeText : {};
        const constraints = Array.isArray(challengeText.constraints) ? challengeText.constraints : [];
        const references = Array.isArray(challengeText.references) ? challengeText.references : [];

        const lastActivityAt = c.timestampLastActivityAt
            ? new Date(c.timestampLastActivityAt).toLocaleString()
            : 'Unknown';

        const cadencePeriodStart = c.cadencePeriodStart
            ? new Date(c.cadencePeriodStart).toLocaleString()
            : 'Not started';

        const lifecycleBlock = `
            ${c.isExecuting ? `
                <div class="detail-pane-field">
                    <label>Executing</label>
                    <span>YES</span>
                </div>
            ` : ''}
            ${c.status === 'FAILED' ? `
                <div class="detail-pane-field challenge-failure-field">
                    <label>Failure Reason</label>
                    <span class="failure-reason-val">${c.failureReason || 'NONE PROVIDED'}</span>
                </div>
            ` : ''}
        `;

        const recurringBlock = c.durationType === 'RECURRING' ? `
            <div class="challenge-data-grid">
                <div class="detail-pane-field"><label>Cadence</label><span>${c.sessionCadenceText || 'N/A'}</span></div>
                <div class="detail-pane-field"><label>Cadence Unit</label><span>${c.cadenceUnit || 'N/A'}</span></div>
                <div class="detail-pane-field"><label>Cadence Progress</label><span>${c.cadenceProgressCounter ?? 0} / ${c.cadenceRequiredCount ?? 0}</span></div>
                <div class="detail-pane-field"><label>Cadence Period Start</label><span>${cadencePeriodStart}</span></div>
            </div>
        ` : '';

        const historyBlock = `
            ${(c.hasBeenAuctioned || c.numbersRaised || c.auctionCost) ? `
                <div class="challenge-data-grid">
                    <div class="detail-pane-field"><label>Has Been Auctioned</label><span>${c.hasBeenAuctioned ? 'YES' : 'NO'}</span></div>
                    ${c.numbersRaised ? `<div class="detail-pane-field"><label>Numbers Raised</label><span>${c.numbersRaised}</span></div>` : ''}
                    ${c.auctionCost ? `<div class="detail-pane-field"><label>Auction Cost</label><span>${c.auctionCost}</span></div>` : ''}
                </div>
            ` : ''}
            ${c.hasBeenDiggedOut ? `
                <div class="detail-pane-field">
                    <label>Has Been Dug Out</label>
                    <span>YES</span>
                </div>
            ` : ''}
        `;

        detailContent.innerHTML = `
            <div class="detail-pane-header">
                <h3 class="neon-text detail-pane-title">CHALLENGE DETAILS</h3>
                <div class="detail-pane-meta roboto">ID: ${c.challengeId} | Submitted: ${submittedAt}</div>
            </div>

            <div class="challenge-data-grid">
                <div class="detail-pane-field"><label>Challenge ID</label><span>${c.challengeId}</span></div>
                <div class="detail-pane-field">
                    <label>Status</label>
                    <div class="status-badge-wrapper">
                        <span class="status-badge status-${String(c.status || '').toLowerCase()}">${c.status || 'UNKNOWN'}</span>
                    </div>
                </div>
                <div class="detail-pane-field"><label>Category</label><span>${c.category || 'General'}</span></div>
                <div class="detail-pane-field"><label>Proposer</label><span>${proposerName}${proposerPlatform ? ` @ ${proposerPlatform}` : ''}</span></div>
                <div class="detail-pane-field"><label>Submitted</label><span>${submittedAt}</span></div>
                <div class="detail-pane-field"><label>Last Activity</label><span>${lastActivityAt}</span></div>
                <div class="detail-pane-field"><label>Stream Days Active</label><span>${c.streamDaysSinceActivation ?? 0}</span></div>
                <div class="detail-pane-field"><label>Duration Type</label><span>${c.durationType || 'N/A'}</span></div>
            </div>

            <div class="challenge-data-grid">
                <div class="detail-pane-field"><label>Progression</label><span>${c.currentSessionCount ?? 0} / ${c.totalSessions ?? 0}</span></div>
                <div class="detail-pane-field"><label>Pushes</label><span>${c.totalPush ?? 0}</span></div>
                <div class="detail-pane-field"><label>Unique Pushers</label><span>${c.uniquePusher ?? 0}</span></div>
                <div class="detail-pane-field"><label>Submission Cost</label><span>${c.submissionCost ?? 0}</span></div>
            </div>

            ${recurringBlock}
            ${lifecycleBlock}
            ${historyBlock}

            <div class="detail-challenge-text roboto">
                <strong>GOAL:</strong><br>
                ${challengeText.goal || 'N/A'}
                <br><br>

                <strong>INSTRUCTIONS:</strong><br>
                ${challengeText.instructions || 'N/A'}
                <br><br>

                ${constraints.length ? `
                    <strong>CONSTRAINTS:</strong>
                    <ul>
                        ${constraints.map(item => `<li>${item}</li>`).join('')}
                    </ul>
                    <br>
                ` : ''}

                ${references.length ? `
                    <strong>REFERENCES:</strong>
                    <ul>
                        ${references.map(ref => `
                            <li>
                                [${ref?.type || 'LINK'}] ${ref?.title || 'Untitled'}
                                ${ref?.url ? `<br><small>${ref.url}</small>` : ''}
                                ${ref?.note ? `<br><small>${ref.note}</small>` : ''}
                            </li>
                        `).join('')}
                    </ul>
                    <br>
                ` : ''}
            </div>

            <button onclick="copyToClipboard('${shareLink}')" class="primary-submit-btn detail-share-btn">
                <i class="fa-solid fa-share-nodes"></i> COPY CHALLENGE LINK
            </button>
        `;

        setTimeout(() => {
            const grid = document.querySelector('.explorer-content-grid');

            if (paneContent) {
                paneContent.scrollTop = 0;
            }

            grid.scrollTo({
                top: 0,
                left: detailPane.offsetLeft,
                behavior: 'smooth'
            });
        }, 21);
    }

    /* ==========================================================================
       10. SHARED UI INTERACTIONS
       ========================================================================== */
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        alert("Challenge Link Copied to Clipboard");
    }

    async function fetchStreamStatus() {
        const indicator = document.getElementById('streamStatusIndicator');
        const text = document.getElementById('streamStatusText');

        try {
            const response = await fetch(`${API_BASE_URL}/stream/stats`);
            const data = await response.json();

            if (indicator && text) {
                indicator.className = `stream-status-indicator ${data.isStreamLive ? 'is-live' : 'is-offline'}`;
                text.textContent = data.isStreamLive ? 'LIVE' : 'OFFLINE';
            }
        } catch (err) {
            console.error("Stream status sync failed");
        }
    }

    function togglePane(id, event) {
        if (event) event.stopPropagation();

        const pane = document.getElementById(id);
        pane.classList.toggle('collapsed');

        if (id === 'detailPane' && !pane.classList.contains('collapsed')) {
            setTimeout(() => {
                pane.scrollIntoView({
                    behavior: 'smooth',
                    inline: 'end',
                    block: 'nearest'
                });
            }, 21);
        } else if (id === 'detailPane' && pane.classList.contains('collapsed')) {
            document.querySelector('.explorer-main').scrollIntoView({
                behavior: 'smooth',
                inline: 'start'
            });
        }
    }

    /* ==========================================================================
       11. EVENT BINDINGS
       ========================================================================== */
    [minDaysRange, maxDaysRange].forEach(el => el.addEventListener('input', syncActiveDaysRange));
    [minDaysInput, maxDaysInput].forEach(el => el.addEventListener('change', (e) => {
        if (e.target.id === 'minDaysInput') {
            minDaysRange.value = e.target.value;
        } else {
            maxDaysRange.value = e.target.value;
        }
        syncActiveDaysRange();
    }));

    [minPushRange, maxPushRange].forEach(el => el.addEventListener('input', syncPushRange));
    [minPushInput, maxPushInput].forEach(el => el.addEventListener('change', (e) => {
        if (e.target.id === 'minPushInput') {
            minPushRange.value = e.target.value;
        } else {
            maxPushRange.value = e.target.value;
        }
        syncPushRange();
    }));

    globalSearchInput.addEventListener('input', applyFilters);

    /* ==========================================================================
       12. BOOTSTRAP
       ========================================================================== */
    window.onload = () => {
        if (window.innerWidth <= 768) {
            document.getElementById('filterPane').classList.add('collapsed');
        }

        fetchStreamStatus();
        syncActiveDaysRange();

        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');
        const savedToken = localStorage.getItem('explorer_token');
        const tokenToVerify = urlToken || savedToken;

        if (tokenToVerify) {
            verifyExplorerAccess(tokenToVerify);
        } else {
            showLockScreen(`
                Private Feature<br>
                The Explorer is a paid access tool for browsing the full challenge database.<br>
                Get an access link through chat, or open a public challenge page instead.<br>
                <span style="font-size:11px">Use !challengeexplorer in chat.</span>
            `);
        }
    };

    document.addEventListener('header-ready', () => {
        console.log("✅ Explorer Header Ready");
        fetchStreamStatus();
    });
</script>
</body>
</html>
